# Render Blueprint — FAB Finance Backend
services:
  - type: web
    name: fab-finance-backend
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: DB_NAME
        value: fab_finance
      - key: JWT_SECRET
        generateValue: true  # Render generates a secure random value
      - key: FRONTEND_URL
        sync: false          # e.g. https://your-app.vercel.app
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
